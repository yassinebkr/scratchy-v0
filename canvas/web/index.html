<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a14">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Scratchy Canvas</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400&display=swap">
    <link rel="stylesheet" href="css/canvas.css?v=60">
    <link rel="icon" href="/favicon.ico">
</head>
<body>

    <!-- Header -->
    <header class="app-header">
        <div class="app-title">✦ Scratchy</div>
        <div id="session-indicator" class="session-info">Connecting...</div>
    </header>

    <!-- Canvas: the main viewport -->
    <div class="canvas-viewport" id="canvas-viewport">
        <div class="canvas-grid" id="canvas-grid">
            <!-- Components rendered here by canvas-app.js -->
        </div>
        <div class="canvas-empty" id="canvas-empty">
            <div class="canvas-empty-icon">✦</div>
            <div>Waiting for components...</div>
        </div>
    </div>

    <!-- Chat Panel: collapsible bottom bar -->
    <div class="chat-panel" id="chat-panel">
        <div class="chat-panel-header" id="chat-panel-toggle">
            <span class="chat-panel-status" id="chat-status">💬 Ready</span>
            <button class="chat-panel-expand" id="chat-expand-btn">▲</button>
        </div>
        <div class="chat-panel-messages" id="chat-messages">
            <!-- Recent messages shown here -->
        </div>
        <div class="chat-panel-input">
            <textarea id="chat-input" class="chat-input" placeholder="Message Gilberte..." rows="1"></textarea>
            <button id="send-btn" class="chat-send">➤</button>
        </div>
    </div>

    <!-- Connection toast -->
    <div class="conn-toast" id="conn-toast"></div>

    <!-- Scripts -->
    <script src="js/purify.min.js"></script>
    <script src="js/morphdom.min.js"></script>
    <script src="js/config.js?v=60"></script>
    <script src="js/components.js?v=60"></script>
    <script src="js/canvas-components.js?v=60"></script>
    <script src="js/markdown.js?v=60"></script>
    <script src="js/connection.js?v=60"></script>
    <script src="js/canvas-state.js?v=60"></script>
    <script src="js/canvas-renderer.js?v=60"></script>
    <script src="js/canvas-app.js?v=60"></script>

    <script>
    function safeHTML(el, html) {
      if (typeof DOMPurify !== "undefined") {
        el.innerHTML = DOMPurify.sanitize(html, {
          ADD_ATTR: ['style','target','data-sui-send','data-sui-form','data-size','data-type','data-alert-type','data-component-id'],
          ADD_TAGS: ['details','summary'],
          ALLOW_DATA_ATTR: true
        });
      } else {
        el.innerHTML = html;
      }
    }
    </script>
</body>
</html>
