<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Scratchy — Login</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scratchy">
  <link rel="apple-touch-icon" href="/icons/icon-192.png">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      background: #16213e;
      border: 1px solid rgba(255, 255, 255, 0.06);
      border-radius: 16px;
      padding: 48px 40px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      animation: slideUp 0.4s ease-out;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      font-size: 3.5rem;
      margin-bottom: 8px;
      display: block;
    }

    .title {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #f0f0f0;
    }

    .subtitle {
      color: #666;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }

    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-group input {
      width: 100%;
      background: #0f1729;
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #e0e0e0;
      padding: 14px 48px 14px 16px;
      border-radius: 10px;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-group input:focus {
      border-color: #e94560;
    }

    .input-group input::placeholder {
      color: #555;
    }

    .toggle-vis {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #666;
      cursor: pointer;
      font-size: 1.2rem;
      padding: 4px;
      line-height: 1;
      transition: color 0.2s;
    }

    .toggle-vis:hover {
      color: #e0e0e0;
    }

    .btn {
      width: 100%;
      background: #e94560;
      color: white;
      border: none;
      padding: 14px 24px;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:hover:not(:disabled) {
      background: #ff6b81;
      transform: translateY(-1px);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .btn.loading .spinner { display: block; }
    .btn.loading .btn-text { display: none; }

    .error-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      margin-bottom: 16px;
      display: none;
      animation: shake 0.3s ease-out;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    .error-msg.visible { display: block; }

    .lockout-msg {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #ef4444;
      padding: 14px;
      border-radius: 8px;
      font-size: 0.85rem;
      display: none;
    }

    .lockout-msg.visible { display: block; }

    .footer {
      margin-top: 24px;
      font-size: 0.75rem;
      color: #444;
    }

    .footer a {
      color: #e94560;
      text-decoration: none;
    }

    @media (max-width: 480px) {
      .login-card {
        padding: 36px 24px;
      }
      .logo { font-size: 3rem; }
      .title { font-size: 1.3rem; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <span class="logo">🐱</span>
    <h1 class="title">Scratchy</h1>
    <p class="subtitle">Enter your gateway token to connect</p>

    <div class="error-msg" id="error"></div>
    <div class="lockout-msg" id="lockout"></div>

    <form id="login-form">
      <input type="hidden" id="csrf" name="csrf" value="">
      <div class="input-group">
        <input type="password" id="token" name="token" placeholder="Gateway token" autocomplete="off" autofocus required>
        <button type="button" class="toggle-vis" id="toggle-vis" title="Show/hide token">👁</button>
      </div>
      <button type="submit" class="btn" id="submit-btn">
        <div class="spinner"></div>
        <span class="btn-text">Connect</span>
      </button>
    </form>

    <p class="footer">Built on <a href="https://github.com/openclaw/openclaw" target="_blank" rel="noopener">OpenClaw</a>, forked from <a href="https://github.com/openclaw/openclaw" target="_blank" rel="noopener">OpenClaw</a></p>
  </div>

  <script src="/js/login.js"></script>
</body>
</html>
